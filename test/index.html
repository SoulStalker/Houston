<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <label class="input-group">
        <input type="radio" name="gender" class="input-group__control" checked>
        <span class="input-group__text">Male</span>
    </label>
    <label class="input-group">
        <input type="radio" name="gender" class="input-group__control">
        <span class="input-group__text">Female</span>
    </label>
    <div class="switch">
        <input type="checkbox" name="" id="switch1" class="switch__control">
        <label for="switch1" class="switch__container">
            <span class="switch__toggle"></span>
        </label>
    </div>
</body>
